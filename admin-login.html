<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FurrfectCafe Admin | Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top right, rgba(201, 122, 53, 0.12), transparent 18%),
        radial-gradient(circle at bottom left, rgba(201, 122, 53, 0.10), transparent 20%),
        linear-gradient(135deg, #4b2617 0%, #2b140c 100%);
    }

    .admin-auth-card {
      width: min(100%, 430px);
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 30px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.22);
      padding: 34px 30px;
      text-align: center;
    }

    .admin-auth-logo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      margin: 0 auto 14px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      box-shadow: var(--shadow-sm);
    }

    .admin-auth-title {
      font-size: 2.15rem;
      margin-bottom: 6px;
    }

    .admin-auth-subtitle {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text-muted);
      margin-bottom: 22px;
    }

    .admin-auth-note {
      display: flex;
      gap: 10px;
      align-items: center;
      background: #eef6fd;
      color: #3f6f92;
      border-radius: 16px;
      padding: 12px 14px;
      text-align: left;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.92rem;
      margin-bottom: 18px;
    }

    .admin-auth-footer {
      margin-top: 18px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text-muted);
      font-size: 0.92rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="admin-auth-page">
    <section class="admin-auth-card">
      <div class="admin-auth-logo">CAFE</div>
      <h1 class="admin-auth-title">Admin Login</h1>
      <p class="admin-auth-subtitle">FurrfectCafe Management Panel</p>

      <div class="admin-auth-note">
        <span>ℹ️</span>
        <span>Staff access only. Front-end demo login for presentation purposes.</span>
      </div>

      <form id="adminLoginForm" class="form-grid" novalidate>
        <div class="field" style="text-align:left;">
          <label for="adminEmail">Email Address</label>
          <input class="input" type="email" id="adminEmail" placeholder="admin@furrfectcafe.ph" required>
        </div>

        <div class="field" style="text-align:left;">
          <label for="adminPassword">Password</label>
          <input class="input" type="password" id="adminPassword" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full">🔐 Sign in to Dashboard</button>
      </form>

      <a href="index.html" class="back-link">← Back to customer site</a>
      <div class="admin-auth-footer">Demo: any valid email and password with 6+ characters</div>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("adminLoginForm");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const email = document.getElementById("adminEmail").value.trim();
        const password = document.getElementById("adminPassword").value.trim();

        if (!/\S+@\S+\.\S+/.test(email)) {
          alert("Please enter a valid admin email.");
          return;
        }

        if (password.length < 6) {
          alert("Password must be at least 6 characters.");
          return;
        }

        localStorage.setItem("furrfectcafe_admin_logged_in", "true");
        localStorage.setItem("furrfectcafe_admin_user", JSON.stringify({
          name: "Admin",
          email
        }));

        window.location.href = "admin-dashboard.html";
      });
    });
  </script>
</body>
</html>
